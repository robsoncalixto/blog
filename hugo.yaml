baseURL: "https://rcalixto.blog/"
title: "R. Calixto"
theme: PaperMod

defaultContentLanguage: en
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "En"
    languageCode: en
    weight: 1
    title: "R. Calixto"
    params:
      homeInfoParams:
        Title: "Hi, I'm Robson Calixto"
        Content: |
          Software architect and tech lead based in São Paulo. I run engineering at [**4Tech**](https://4techs.com.br/), where we build complex software for healthcare and other regulated industries.

          This blog is where I think out loud — about architecture decisions, AI systems, leadership, and the lessons from shipping products that actually run in production. Not demos. Not theory for its own sake.
    menu:
      main:
        - identifier: posts
          name: Posts
          url: /posts/
          weight: 10
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 20
        - identifier: about
          name: About
          url: /about/
          weight: 30
        - identifier: search
          name: 🔍 Search
          url: /search/
          weight: 40

  pt:
    languageName: "Pt"
    languageCode: pt-br
    weight: 2
    title: "R. Calixto"
    params:
      homeInfoParams:
        Title: "Olá, eu sou o Robson Calixto"
        Content: |
          Arquiteto de software e tech lead em São Paulo. Lidero a engenharia na [**4Tech**](https://4techs.com.br/), onde construímos software complexo para saúde e outros setores regulados.

          Aqui penso em voz alta — sobre decisões de arquitetura, sistemas de IA, liderança e as lições de construir produtos que realmente rodam em produção. Nada de demos. Nada de teoria pela teoria.
    menu:
      main:
        - identifier: posts
          name: Posts
          url: /pt/posts/
          weight: 10
        - identifier: tags
          name: Tags
          url: /pt/tags/
          weight: 20
        - identifier: about
          name: Sobre
          url: /pt/about/
          weight: 30
        - identifier: search
          name: 🔍 Buscar
          url: /pt/search/
          weight: 40

params:
  defaultTheme: dark
  showToc: true
  tocOpen: false
  showBreadcrumbs: true
  showWordCount: true
  showReadingTime: true
  showPostNavLinks: true
  showCodeCopyButtons: true
  comments: true
  env: production
  displayFullLangName: true

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"

  socialIcons:
    - name: github
      url: "https://github.com/robsoncalixto"
    - name: linkedin
      url: "https://www.linkedin.com/in/r-calixto/"
    - name: x
      url: "https://x.com/robsoncaliixto"
    - name: email
      url: "mailto:robsoncaliixto@gmail.com"

outputs:
  home: [HTML, RSS, JSON]

markup:
  goldmark:
    renderer:
      unsafe: true
