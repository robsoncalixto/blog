baseURL: "https://rcalixto.blog/"
languageCode: en
title: "R. Calixto — Notes & Ideas"
theme: PaperMod

params:
  defaultTheme: dark
  showToc: true
  tocOpen: false
  showBreadcrumbs: true
  showWordCount: true
  showReadingTime: true
  showPostNavLinks: true
  showCodeCopyButtons: true
  comments: true
  env: production

  homeInfoParams:
    Title: "Hi, I'm R. Calixto"
    Content: |
      Software architect and tech lead based in São Paulo. I run engineering at [**4Tech**](https://4techs.com.br/), where we build complex software for healthcare and other regulated industries.

      This blog is where I think out loud — about architecture decisions, AI systems, leadership, and the lessons from shipping products that actually run in production. Not demos. Not theory for its own sake.

  assets:
    favicon: "/favicon.ico"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"

  socialIcons:
    - name: github
      url: "https://github.com/robsoncalixto"
    - name: linkedin
      url: "https://www.linkedin.com/in/r-calixto/"
    - name: x
      url: "https://x.com/robsoncaliixto"
    - name: email
      url: "mailto:robsoncaliixto@gmail.com"

outputs:
  home: [HTML, RSS, JSON]

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30
    - identifier: search
      name: 🔍 Search
      url: /search/
      weight: 40

markup:
  goldmark:
    renderer:
      unsafe: true
